services:
  postgres:
    image: postgres:16-alpine
    container_name: fmo_postgres
    environment:
      POSTGRES_USER: fmo
      POSTGRES_PASSWORD: fmo
      POSTGRES_DB: fmo
    ports:
      - "5432:5432"
    volumes:
      - fmo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fmo"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  fmo_postgres_data:
